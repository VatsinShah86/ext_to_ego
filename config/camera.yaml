# camera_config.yaml

camera:
  name: "sim_camera_01"

  # --- Image Sensor ---
  resolution:
    width: 640
    height: 480

  # --- Intrinsics (pinhole model) ---
  intrinsics:
    # Using example values found online for now, will replace with real values later
    focal_length:
      fx: 605.622009277343  # pixels — horizontal focal length
      fy: 605.2809448242188  # pixels — vertical focal length (equal to fx for square pixels)
    principal_point:
      cx: 316.6953125   # pixels — typically width / 2
      cy: 252.77352905273438  # pixels — typically height / 2

  # --- Clip Planes ---
  clip:
    near: 0.0   # meters — points closer than this are culled
    far: 1.0  # meters — points farther than this are culled